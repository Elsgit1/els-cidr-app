name: Container Build and Push to registry.

on:
  push:
    branches: ["main"]
    paths:
      # ONLY run on merges to main if files inside the app directory change
      - 'codebase/rdicidr-0.1.0/**'

  pull_request:
    branches:
      - "**"

  workflow_dispatch:

env:
  AWS_REGION: us-west-1
  REPOSITORY: fsl-app
  REGISTRY: Amazon ECR
  APP_DIR: codebase/rdicidr-0.1.0

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write

    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessary to fetch all tags and history

    # Below step is to skip deployment steps if the PR is created by Dependabot. This is to avoid unnecessary workflow runs for dependency updates.
      - name: Check if actor is Dependabot
        if: github.actor == 'dependabot[bot]'
        run: |
          echo "Dependabot PR detected. Skipping workflow steps."

      - name: Set up node.js
        uses: actions/setup-node@v4
        with:
          node-version: '15.5.1'
          cache: 'npm'
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Linter
        run: npm run lint

      - name: Run tests
        run: CI=true npm run test -- --watch=false

      - name: Build
        run: npm run build

      # ==========================================
      # REGISTRY DEPLOYMENT STEPS 
      # (Only runs on push to main, skipped on PRs)
      # ==========================================

      - name: Setup Git
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
  
      - name: Determine Next Version
        id: next_version
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v1.0.0"
          fi
          NEXT_TAG=$(echo $LATEST_TAG | awk -F. '{print $1"."$2"."$3+1}')
          echo "tag=$NEXT_TAG" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT_TAG"
  
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.next_version.outputs.tag }}
          release_name: fsl-app ${{ steps.next_version.outputs.tag }}
          draft: false
          prerelease: false
  
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
  
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.REPOSITORY }}
          IMAGE_TAG: ${{ steps.next_version.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile .
          echo "IMAGE_NAME=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV
          echo "name=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
                     
      - name: Run Snyk to check Docker image for vulnerabilities
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
           image: ${{ steps.build-image.outputs.name }}
           args: --severity-threshold=high --policy-path=.snyk --file=codebase/rdicidr-0.1.0/Dockerfile
        continue-on-error: true
  
      - name: Push Docker image to registries
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.REPOSITORY }}
          IMAGE_TAG: ${{ steps.next_version.outputs.tag }}
          APP_NAME: fsl-app
          DOCKERHUB_USERNAME: elsdokr
        run: |
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$APP_NAME:$IMAGE_TAG
          docker push $ECR_REGISTRY/$APP_NAME:$IMAGE_TAG

          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $DOCKERHUB_USERNAME/$APP_NAME:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/$APP_NAME:$IMAGE_TAG

  ###########################################################
      ###            Update image tag in manifest             ###
      ###########################################################         

      - name: Update Manifest and Create PR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: .
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.REPOSITORY }}
          IMAGE_TAG: ${{ steps.next_version.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKERHUB_USERNAME: elsdokr
          APP_NAME: fsl-app
        run: |
          # 1. Configure git user for the runner FIRST
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Create and switch to a unique feature branch
          BRANCH_NAME="update-manifest-${IMAGE_TAG}"
          git checkout -b $BRANCH_NAME

          # 3. Update the manifest file
          sed -i 's|image: .*|image: '"$DOCKERHUB_USERNAME/$APP_NAME:$IMAGE_TAG"'|g' k8/service.yml
          echo "Updated deployment image tag to $IMAGE_TAG"

          # 4. Commit and push the feature branch
          git add k8/service.yml
          git commit -m "chore: updated manifest to new image tag $IMAGE_TAG"
          git push origin $BRANCH_NAME

          # 5. Create the Pull Request using GitHub CLI
          gh pr create \
            --title "chore: update manifest to new image tag $IMAGE_TAG" \
            --body "A new image has been pushed to the registry, updating the manifest with the new tag." \
            --base main \
            --head $BRANCH_NAME \
            --fill
