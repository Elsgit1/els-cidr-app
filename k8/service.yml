apiVersion: v1
kind: Namespace
metadata:
  name: production
---
apiVersion: v1
kind: Service
metadata:
  name: rdicidr-headless
  namespace: production
spec:
  ports:
  - port: 8080
    name: http
    targetPort: 80
  clusterIP: None
  selector:
    app: rdicidr
---
apiVersion: v1
kind: Service
metadata:
  name: rdicidr
  namespace: production
spec:
  ports:
  - port: 8080
    name: http
    targetPort: 80
  clusterIP: ClusterIP
  selector:
    app: rdicidr
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rdicidr
  namespace: production
spec:
  serviceName: rdicidr-headless
  replicas: 3
  selector:
    matchLabels:
      app: rdicidr
  template:
    metadata:
      labels:
        app: rdicidr
    spec:
      containers:
      - name: rdicidr
        image: elsdokr/fsl-app:v1.0.1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: rdicidr-data
          mountPath: /var/lib/rdicidr
  volumeClaimTemplates:
  - metadata:
      name: rdicidr-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: rdicr-storage
      resources:
        requests:
          storage: 1Gi
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: rdicr-storage
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: rdicr-pv-0
  namespace: production
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: rdicr-storage
  hostPath:
    path: /tmp/rdicidr-pv-0
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: rdicr-pv-1
  namespace: production
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: rdicr-storage
  hostPath:
    path: /tmp/rdicidr-pv-1
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: rdicr-pv-2
  namespace: production
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: rdicr-storage
  hostPath:
    path: /tmp/rdicidr-pv-2
    type: DirectoryOrCreate
